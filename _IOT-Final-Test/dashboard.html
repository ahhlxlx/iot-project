<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Mesh Network — Control Panel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --bg-primary: #0a0e17;
    --bg-card: #111827;
    --bg-card-inner: #0f1520;
    --bg-hover: #1a2332;
    --border: #1e2a3a;
    --border-active: #2d3f56;
    --text-primary: #e2e8f0;
    --text-secondary: #8892a4;
    --text-muted: #5a6577;
    --accent-green: #22c55e;
    --accent-green-dim: rgba(34, 197, 94, 0.15);
    --accent-cyan: #06b6d4;
    --accent-cyan-dim: rgba(6, 182, 212, 0.12);
    --accent-orange: #f59e0b;
    --accent-orange-dim: rgba(245, 158, 11, 0.12);
    --accent-red: #ef4444;
    --accent-red-dim: rgba(239, 68, 68, 0.12);
    --accent-purple: #a78bfa;
    --accent-purple-dim: rgba(167, 139, 250, 0.12);
    --accent-blue: #3b82f6;
    --accent-blue-dim: rgba(59, 130, 246, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ── HEADER ──────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(17,24,39,0.95) 0%, var(--bg-primary) 100%);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #000;
  }
  .header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .header-title span { color: var(--text-secondary); font-weight: 400; }
  .header-right {
    display: flex; align-items: center; gap: 18px;
    font-size: 13px; color: var(--text-secondary);
  }
  .status-dot {
    width: 9px; height: 9px; border-radius: 50%;
    display: inline-block; margin-right: 6px;
  }
  .status-dot.online { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
  .status-dot.offline { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); }

  /* ── SUMMARY STRIP ──────────────────────── */
  .summary-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    padding: 20px 28px;
  }
  .summary-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
  }
  .summary-card .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .summary-card .value {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.1;
  }
  .summary-card .sub {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .val-green { color: var(--accent-green); }
  .val-orange { color: var(--accent-orange); }
  .val-red { color: var(--accent-red); }
  .val-cyan { color: var(--accent-cyan); }

  /* ── TABS ────────────────────────────────── */
  .tabs {
    display: flex; gap: 2px;
    padding: 0 28px;
    margin-bottom: 20px;
  }
  .tab {
    padding: 10px 22px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 8px 8px 0 0;
    border: 1px solid transparent;
    border-bottom: none;
    transition: all 0.2s;
    user-select: none;
  }
  .tab:hover { color: var(--text-primary); background: var(--bg-hover); }
  .tab.active {
    color: var(--text-primary);
    background: var(--bg-card);
    border-color: var(--border);
  }

  /* ── TAB PANELS ─────────────────────────── */
  .tab-panel { display: none; padding: 0 28px 28px; }
  .tab-panel.active { display: block; }

  /* ── NODE CARDS ─────────────────────────── */
  .node-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 18px;
  }
  .node-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .node-card:hover { border-color: var(--border-active); }
  .node-card-accent {
    height: 3px;
    background: linear-gradient(90deg, var(--accent-cyan), var(--accent-green));
  }
  .node-card-accent.degraded {
    background: linear-gradient(90deg, var(--accent-orange), var(--accent-red));
  }
  .node-card-accent.offline { background: var(--accent-red); }

  .node-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 10px;
  }
  .node-name { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
  .node-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .badge-online { background: var(--accent-green-dim); color: var(--accent-green); }
  .badge-degraded { background: var(--accent-orange-dim); color: var(--accent-orange); }
  .badge-offline { background: var(--accent-red-dim); color: var(--accent-red); }

  /* ── METRICS GRID ───────────────────────── */
  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 6px 20px;
  }
  .metric-box {
    background: var(--bg-card-inner);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .metric-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .metric-value {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.2;
  }
  .metric-sub {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .metric-sub .w-val { color: var(--accent-cyan); }
  .metric-sub .b-val { color: var(--accent-purple); }

  /* ── ROUTE INFO ─────────────────────────── */
  .route-section {
    margin: 12px 20px;
    background: var(--bg-card-inner);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .route-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .route-header-left {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text-secondary);
  }
  .proto-badge {
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 4px;
    text-transform: uppercase;
  }
  .proto-wifi { background: var(--accent-cyan-dim); color: var(--accent-cyan); }
  .proto-ble { background: var(--accent-purple-dim); color: var(--accent-purple); }
  .route-cost {
    font-size: 13px; font-weight: 600;
    color: var(--accent-orange);
  }
  .route-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    font-size: 12px;
  }
  .route-col-label {
    font-weight: 600; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .route-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    color: var(--text-secondary);
  }
  .route-row .rv { font-weight: 500; color: var(--text-primary); }


  /* ── NODE FOOTER ────────────────────────── */
  .node-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    font-size: 11px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
  }
  .score-bar-bg {
    width: 60px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s;
  }

  /* ── CHARTS TAB ─────────────────────────── */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  .chart-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .chart-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  canvas { width: 100% !important; }

  /* ── TOPOLOGY TAB ───────────────────────── */
  .topology-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    min-height: 560px;
    padding: 20px;
    position: relative;
  }
  .topo-svg { width: 100%; height: 520px; }
  .topo-node-circle {
    cursor: pointer;
    transition: r 0.3s;
  }
  .topo-node-circle:hover { r: 28; }

  /* ── TOAST NOTIFICATIONS ────────────────── */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 1000;
    display: flex;
    flex-direction: column-reverse;
    gap: 8px;
  }
  .toast {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--text-primary);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: toastIn 0.3s ease-out;
    max-width: 340px;
  }
  .toast.success { border-left: 3px solid var(--accent-green); }
  .toast.error { border-left: 3px solid var(--accent-red); }
  .toast.info { border-left: 3px solid var(--accent-cyan); }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ─────────────────────────── */
  @media (max-width: 900px) {
    .node-grid { grid-template-columns: 1fr; }
    .chart-grid { grid-template-columns: 1fr; }
    .summary-strip { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">M</div>
    <div class="header-title">IoT Mesh Network <span>Control Panel</span></div>
  </div>
  <div class="header-right">
    <span id="gwStatus"><span class="status-dot offline"></span> Connecting…</span>
    <span id="lastUpdate" class="mono" style="font-size:12px;">—</span>
  </div>
</div>

<!-- SUMMARY -->
<div class="summary-strip" id="summaryStrip">
  <div class="summary-card">
    <div class="label">Total Nodes</div>
    <div class="value" id="totalNodes">—</div>
    <div class="sub">detected by gateway</div>
  </div>
  <div class="summary-card">
    <div class="label">Online</div>
    <div class="value val-green" id="onlineNodes">—</div>
    <div class="sub" id="onlinePct">—</div>
  </div>
  <div class="summary-card">
    <div class="label">Degraded</div>
    <div class="value val-orange" id="degradedNodes">0</div>
    <div class="sub" id="degradedPct">0%</div>
  </div>
  <div class="summary-card">
    <div class="label">Offline</div>
    <div class="value val-red" id="offlineNodes">0</div>
    <div class="sub" id="offlinePct">0%</div>
  </div>
  <div class="summary-card">
    <div class="label">Avg Latency</div>
    <div class="value" id="avgLatency">—</div>
    <div class="sub">WiFi / BLE</div>
  </div>
  <div class="summary-card">
    <div class="label">Best Protocol</div>
    <div class="value val-cyan" id="bestProto">—</div>
    <div class="sub" id="protoSummary">—</div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" data-tab="nodes">Node Status</div>
  <div class="tab" data-tab="charts">Latency &amp; RSSI</div>
  <div class="tab" data-tab="compare">WiFi vs BLE</div>
  <div class="tab" data-tab="topology">Topology &amp; Routes</div>
  <a href="/path" class="tab" style="text-decoration:none;color:var(--accent-orange);border:1px solid var(--accent-orange-dim);background:var(--accent-orange-dim);">⬡ Path Analysis →</a>
</div>

<!-- TAB: NODES -->
<div class="tab-panel active" id="panel-nodes">
  <div class="node-grid" id="nodeGrid"></div>
</div>

<!-- TAB: CHARTS -->
<div class="tab-panel" id="panel-charts">
  <div class="chart-grid" id="chartGrid"></div>
</div>

<!-- TAB: COMPARE -->
<div class="tab-panel" id="panel-compare">
  <div class="chart-grid" id="compareGrid"></div>
</div>

<!-- TAB: TOPOLOGY -->
<div class="tab-panel" id="panel-topology">
  <div class="topology-container" id="topoContainer">
    <div style="display:flex;gap:20px;margin-bottom:8px;font-size:11px;color:#5a6577;">
      <span><span style="display:inline-block;width:20px;height:3px;background:#06b6d4;vertical-align:middle;margin-right:6px;border-radius:2px;"></span>WiFi link</span>
      <span><span style="display:inline-block;width:20px;height:3px;background:#a78bfa;vertical-align:middle;margin-right:6px;border-radius:2px;"></span>Bluetooth link</span>
      <span><span style="display:inline-block;width:20px;height:2px;border-top:2px dashed #2d3f56;vertical-align:middle;margin-right:6px;"></span>Neighbour</span>
      <span style="margin-left:auto;color:#8892a4;">Nodes update every 2s</span>
    </div>
    <svg id="topoSvg" class="topo-svg"></svg>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toastContainer"></div>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<script>
// Human-readable protocol label
function protoLabel(p) {
  if (!p) return '?';
  if (p === 'BLE' || p === 'BLE-Direct' || p === 'BLE-only' || (p && p.includes('BLE'))) return 'Bluetooth';
  return p;
}

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let ws = null;
let latestData = null;
let charts = {};       // chart instances keyed by canvas id

// ══════════════════════════════════════════════
//  TOAST NOTIFICATIONS
// ══════════════════════════════════════════════
function showToast(msg, type = 'info', duration = 3500) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, duration);
}

// ══════════════════════════════════════════════
//  WEBSOCKET
// ══════════════════════════════════════════════
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('gwStatus').innerHTML =
      '<span class="status-dot online"></span> Connected';
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.type === 'update') {
        latestData = data;
        renderAll(data);
      }
    } catch(e) { console.error('WS parse error', e); }
  };

  ws.onclose = () => {
    document.getElementById('gwStatus').innerHTML =
      '<span class="status-dot offline"></span> Disconnected';
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();
}

// ══════════════════════════════════════════════
//  RENDER ALL
// ══════════════════════════════════════════════
function renderAll(data) {
  renderSummary(data);
  renderNodeCards(data);
  renderCharts(data);
  renderTopology(data);
  document.getElementById('lastUpdate').textContent = data.timestamp || '—';

  const gwOnline = data.gateway_online;
  document.getElementById('gwStatus').innerHTML = gwOnline
    ? '<span class="status-dot online"></span> Gateway: Online'
    : '<span class="status-dot offline"></span> Gateway: Offline';
}

// ══════════════════════════════════════════════
//  SUMMARY STRIP
// ══════════════════════════════════════════════
function renderSummary(data) {
  const nodes = data.health_matrix?.nodes || {};
  const ids = Object.keys(nodes);
  const total = ids.length;

  let online = 0, degraded = 0, offline = 0;
  let latSum = 0, latCount = 0;
  let wifiRoutes = 0, bleRoutes = 0;

  ids.forEach(id => {
    const n = nodes[id];
    if (n.status === 'ONLINE') online++;
    else if (n.status === 'DEGRADED') degraded++;
    else offline++;

    const lat = n.avg_latency_ms || 0;
    if (lat > 0) { latSum += lat; latCount++; }

    // ✅ Count each NODE's own best protocol exactly once
    // Use the node's protocol field, or fall back to its best routing
    // table entry — but never loop over all routing table entries.
    const nodeProto = n.protocol || '';
    if (!nodeProto) return; // skip if unknown

    if (nodeProto.includes('BLE')) bleRoutes++;
    else if (nodeProto === 'WiFi' || nodeProto.includes('WiFi')) wifiRoutes++;
  });

  document.getElementById('totalNodes').textContent = total;
  document.getElementById('onlineNodes').textContent = online;
  document.getElementById('onlinePct').textContent = total ? Math.round(online/total*100) + '%' : '—';
  document.getElementById('degradedNodes').textContent = degraded;
  document.getElementById('degradedPct').textContent = total ? Math.round(degraded/total*100) + '%' : '0%';
  document.getElementById('offlineNodes').textContent = offline;
  document.getElementById('offlinePct').textContent = total ? Math.round(offline/total*100) + '%' : '0%';
  document.getElementById('avgLatency').textContent = latCount ? (latSum/latCount).toFixed(1) + ' ms' : '—';

  const bestP = wifiRoutes >= bleRoutes ? 'WiFi' : 'Bluetooth';
  document.getElementById('bestProto').textContent = bestP;
  document.getElementById('protoSummary').textContent = `WiFi: ${wifiRoutes} | Bluetooth: ${bleRoutes} routes`;
}
// ══════════════════════════════════════════════
//  NODE CARDS
// ══════════════════════════════════════════════
function renderNodeCards(data) {
  const nodes = data.health_matrix?.nodes || {};
  const grid = document.getElementById('nodeGrid');
  const ids = Object.keys(nodes).sort();

  // Build or update cards
  ids.forEach(id => {
    const n = nodes[id];
    let card = document.getElementById(`card-${id}`);
    if (!card) {
      card = document.createElement('div');
      card.className = 'node-card';
      card.id = `card-${id}`;
      grid.appendChild(card);
    }
    card.innerHTML = buildNodeCardHTML(id, n, data);
  });

  // Remove cards for nodes that disappeared
  Array.from(grid.children).forEach(el => {
    const nid = el.id.replace('card-', '');
    if (!nodes[nid]) el.remove();
  });

}

// ══════════════════════════════════════════════
//  FORMAT HELPERS
// ══════════════════════════════════════════════
function fmtMs(v) { return (v != null && v > 0) ? v.toFixed(1) + 'ms' : '—'; }
function fmtDec(v, dp) { return (v != null && v > 0) ? v.toFixed(dp) : '—'; }

function buildNodeCardHTML(id, n, data) {
  const status = n.status || 'OFFLINE';
  const statusLower = status.toLowerCase();
  const badgeClass = `badge-${statusLower}`;
  const accentClass = statusLower === 'online' ? '' : statusLower;

  const metrics = n.metrics || {};

  // Routing info — get the best route entry
  const rt = n.routing_table || {};
  const rtKeys = Object.keys(rt);
  let bestRoute = null;
  if (rtKeys.length > 0) {
    bestRoute = rt[rtKeys[0]];
  }

  // ── Cost function (mirrors node.py compute_cost) ─────────────
  // weights come from the node's current preference
  const weights = n.weights || { w_latency: 0.5, w_packet_loss: 0.3, w_power: 0.2 };
  function computeCost(lat, loss, power) {
    return weights.w_latency * (lat / 100.0) + weights.w_packet_loss * loss + weights.w_power * power;
  }

  // ── BLE latency estimate from RSSI (mirrors node.py) ─────────
  // -40dBm → ~25ms, -80dBm → ~80ms
  function estimateBleLat(rssi) {
    if (rssi <= -99) return 0;
    return Math.max(20, Math.min(120, (rssi + 40) * -1.375 + 25));
  }

  // ── Gather all sources ────────────────────────────────────────
  const bestProto = bestRoute?.best_protocol || n.protocol || '—';

  // RSSI
  const wRssi = metrics.wifi_rssi ?? n.rssi ?? -99;
  const bRssi = metrics.ble_rssi ?? -99;

  // Latency: routing table > metrics > estimate from RSSI
  let wLat = bestRoute?.wifi_lat ?? (metrics.wifi_avg_latency_ms || 0);
  let bLat = bestRoute?.ble_lat  ?? (metrics.ble_avg_latency_ms  || 0);

  // If WiFi latency still 0 but node has WiFi data, use top-level
  if (wLat === 0 && wRssi > -99) wLat = n.avg_latency_ms || 0;
  // If BLE latency still 0 but we have BLE RSSI, estimate it
  if (bLat === 0 && bRssi > -99) bLat = estimateBleLat(bRssi);
  // If bestProto latency is in the general route field
  if (wLat === 0 && bestRoute?.avg_latency_ms > 0 && bestProto.includes('WiFi')) wLat = bestRoute.avg_latency_ms;
  if (bLat === 0 && bestRoute?.avg_latency_ms > 0 && bestProto.includes('BLE'))  bLat = bestRoute.avg_latency_ms;

  // Packet loss
  const wLoss = metrics.wifi_packet_loss ?? 0;
  const bLoss = metrics.ble_packet_loss ?? 0;

  // Power cost — only estimate when that protocol is actually available.
  // Do NOT fall back to bestRoute.power_cost for WiFi: that field holds the
  // winner's power cost (could be BLE) and would wrongly show a WiFi power
  // value when WiFi is down.
  const wifiAvail = wRssi > -99 || wLat > 0;
  const bleAvail  = bRssi > -99 || bLat > 0;

  let wPower = 0;
  if (wifiAvail) {
    wPower = metrics.wifi_power_cost || 0;
    if (wPower === 0) wPower = Math.min(1.0, Math.max(0.05, (-wRssi - 50) / 40.0));
  }
  // bPower: only if BLE is actually available
  let bPower = 0;
  if (bleAvail) {
    bPower = metrics.ble_power_cost || 0;
    if (bPower === 0) bPower = Math.min(1.0, Math.max(0.05, (-bRssi - 50) / 40.0));
  }

  // Costs: routing table > compute client-side from available data
  let wCost = bestRoute?.wifi_cost ?? null;
  let bCost = bestRoute?.ble_cost  ?? null;

  // Compute costs only when that protocol is actually available
  if (wCost == null && wifiAvail && wLat > 0) wCost = computeCost(wLat, wLoss, wPower);
  if (bCost == null && bleAvail  && bLat > 0) bCost = computeCost(bLat, bLoss, bPower);

  // Overall best cost
  let bestCost = bestRoute?.cost ?? null;
  if (bestCost == null) {
    // Pick the cost matching the best protocol, or whichever is available
    if (bestProto.includes('WiFi') && wCost != null) bestCost = wCost;
    else if (bestProto.includes('BLE') && bCost != null) bestCost = bCost;
    else if (wCost != null && bCost != null) bestCost = Math.min(wCost, bCost);
    else bestCost = wCost ?? bCost;
  }

  // Displayed latency
  const dispLat = n.avg_latency_ms || wLat || bLat || (bestRoute?.avg_latency_ms ?? 0);

  const score = n.health_score ?? 0;
  const scoreColor = score >= 70 ? 'var(--accent-green)' : score >= 40 ? 'var(--accent-orange)' : 'var(--accent-red)';

  const neighbours = n.neighbours || [];
  const hops = n.hop_count || 0;

  return `
    <div class="node-card-accent ${accentClass}"></div>
    <div class="node-header">
      <div class="node-name mono">${id}</div>
      <span class="node-badge ${badgeClass}">${status}</span>
    </div>

    <div class="metrics-grid">
      <div class="metric-box">
        <div class="metric-label">RSSI</div>
        <div class="metric-value">${wRssi > -99 ? wRssi + ' dBm' : bRssi > -99 ? bRssi + ' dBm' : '—'}</div>
        <div class="metric-sub">
          <span class="w-val">W: ${wRssi > -99 ? wRssi + 'dBm' : '—'}</span>
          <span class="b-val" style="margin-left:6px;">BT: ${bRssi > -99 ? Math.round(bRssi) + 'dBm' : '—'}</span>
        </div>
      </div>
      <div class="metric-box">
        <div class="metric-label">Latency</div>
        <div class="metric-value">${dispLat > 0 ? dispLat.toFixed(1) + ' ms' : '—'}</div>
        <div class="metric-sub">
          <span class="w-val">W: ${fmtMs(wLat)}</span>
          <span class="b-val" style="margin-left:6px;">B: ${fmtMs(bLat)}</span>
        </div>
      </div>
      <div class="metric-box">
        <div class="metric-label">Packet Loss</div>
        <div class="metric-value">${((n.packet_loss || 0) * 100).toFixed(1)}%</div>
        <div class="metric-sub">
          <span class="w-val">W: ${(wLoss*100).toFixed(1)}%</span>
          <span class="b-val" style="margin-left:6px;">B: ${(bLoss*100).toFixed(1)}%</span>
        </div>
      </div>
      <div class="metric-box">
        <div class="metric-label">Hops / Neighbours</div>
        <div class="metric-value">${hops} / ${neighbours.length}</div>
      </div>
    </div>

    <div class="route-section">
      <div class="route-header">
        <div class="route-header-left">
          Best Route
          <span class="proto-badge ${bestProto.includes('WiFi') ? 'proto-wifi' : 'proto-ble'}">${protoLabel(bestProto)}</span>
        </div>
        <div class="route-cost mono">COST: ${bestCost != null ? bestCost.toFixed(4) : '—'}</div>
      </div>
      <div class="route-cols">
        <div>
          <div class="route-col-label"><span class="proto-badge proto-wifi">WiFi</span></div>
          <div class="route-row">Latency <span class="rv mono">${fmtMs(wLat)}</span></div>
          <div class="route-row">Power <span class="rv mono">${fmtDec(wPower, 3)}</span></div>
          <div class="route-row">Cost <span class="rv mono">${fmtDec(wCost, 4)}</span></div>
        </div>
        <div>
          <div class="route-col-label"><span class="proto-badge proto-ble">Bluetooth</span></div>
          <div class="route-row">Latency <span class="rv mono">${fmtMs(bLat)}</span></div>
          <div class="route-row">Power <span class="rv mono">${fmtDec(bPower, 3)}</span></div>
          <div class="route-row">Cost <span class="rv mono">${fmtDec(bCost, 4)}</span></div>
        </div>
      </div>
    </div>


    <div class="node-footer">
      <span>
        <span class="score-bar-bg">
          <span class="score-bar-fill" style="width:${score}%;background:${scoreColor};"></span>
        </span>
        Score: ${score}/100
      </span>
      <span>${bestRoute ? protoLabel(bestRoute.best_protocol) + ' → ' + (bestRoute.next_hop || 'direct') : '—'}</span>
      <span>Proto: ${n.protocol || '—'}</span>
    </div>
  `;
}


// ══════════════════════════════════════════════
//  CHARTS
// ══════════════════════════════════════════════
const chartColors = {
  wifi: { border: '#06b6d4', bg: 'rgba(6,182,212,0.15)' },
  ble:  { border: '#a78bfa', bg: 'rgba(167,139,250,0.15)' },
  health: { border: '#22c55e', bg: 'rgba(34,197,94,0.15)' },
};

const commonChartOpts = {
  responsive: true,
  maintainAspectRatio: false,
  animation: { duration: 400 },
  plugins: {
    legend: { labels: { color: '#8892a4', font: { family: 'JetBrains Mono', size: 11 } } },
  },
  scales: {
    x: { ticks: { color: '#5a6577', font: { family: 'JetBrains Mono', size: 10 }, maxTicksLimit: 10 },
         grid: { color: 'rgba(30,42,58,0.5)' } },
    y: { ticks: { color: '#5a6577', font: { family: 'JetBrains Mono', size: 10 } },
         grid: { color: 'rgba(30,42,58,0.5)' } }
  }
};

function renderCharts(data) {
  const history = data.history || {};
  const ids = Object.keys(history).sort();
  if (!ids.length) return;

  // Latency & RSSI tab
  const chartGrid = document.getElementById('chartGrid');
  ids.forEach(id => {
    const h = history[id];
    // Latency chart
    renderLineChart(chartGrid, `lat-${id}`, `${id} — Latency (ms)`, h.timestamps, [
      { label: 'WiFi', data: h.latency_wifi, ...chartColors.wifi },
      { label: 'Bluetooth', data: h.latency_ble, ...chartColors.ble },
    ]);
    // RSSI chart
    renderLineChart(chartGrid, `rssi-${id}`, `${id} — RSSI (dBm)`, h.timestamps, [
      { label: 'WiFi', data: h.rssi_wifi, ...chartColors.wifi },
      { label: 'Bluetooth', data: h.rssi_ble, ...chartColors.ble },
    ]);
  });

  // WiFi vs BLE tab
  const compareGrid = document.getElementById('compareGrid');
  ids.forEach(id => {
    const h = history[id];
    renderLineChart(compareGrid, `ploss-${id}`, `${id} — Packet Loss (%)`, h.timestamps, [
      { label: 'WiFi', data: (h.packet_loss_wifi || []).map(v => (v*100).toFixed(1)), ...chartColors.wifi },
      { label: 'Bluetooth', data: (h.packet_loss_ble || []).map(v => (v*100).toFixed(1)), ...chartColors.ble },
    ]);
    renderLineChart(compareGrid, `health-${id}`, `${id} — Health Score`, h.timestamps, [
      { label: 'Score', data: h.health_score, ...chartColors.health },
    ]);
  });
}

function renderLineChart(container, canvasId, title, labels, datasets) {
  let wrapper = document.getElementById(`wrap-${canvasId}`);
  if (!wrapper) {
    wrapper = document.createElement('div');
    wrapper.className = 'chart-container';
    wrapper.id = `wrap-${canvasId}`;
    wrapper.innerHTML = `<div class="chart-title">${title}</div><div style="height:200px"><canvas id="${canvasId}"></canvas></div>`;
    container.appendChild(wrapper);
  }

  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  if (charts[canvasId]) {
    const chart = charts[canvasId];
    chart.data.labels = labels;
    datasets.forEach((ds, i) => {
      if (chart.data.datasets[i]) {
        chart.data.datasets[i].data = ds.data;
      }
    });
    chart.update('none');
    return;
  }

  charts[canvasId] = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: datasets.map(ds => ({
        label: ds.label,
        data: ds.data,
        borderColor: ds.border,
        backgroundColor: ds.bg,
        borderWidth: 2,
        pointRadius: 0,
        tension: 0.3,
        fill: true,
      }))
    },
    options: { ...commonChartOpts }
  });
}

function renderTopology(data) {
  const nodes = data.health_matrix?.nodes || {};
  const edges = data.topology?.edges || [];
  const svg = document.getElementById('topoSvg');
  if (!svg) return;

  const ids = Object.keys(nodes).sort();
  if (!ids.length) {
    svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#5a6577" font-size="14">No nodes detected</text>';
    return;
  }

  const W = svg.clientWidth || 900;
  const H = svg.clientHeight || 460;
  const gwX = W / 2, gwY = H / 2;

  const positions = { GATEWAY: { x: gwX, y: gwY } };
  const radius = Math.min(W, H) * 0.42;

  if (ids.length === 1) {
    positions[ids[0]] = { x: gwX + radius, y: gwY };
  } else if (ids.length === 2) {
    positions[ids[0]] = { x: gwX - radius, y: gwY };
    positions[ids[1]] = { x: gwX + radius, y: gwY };
  } else {
    ids.forEach((id, i) => {
      const angle = (2 * Math.PI * i / ids.length) - Math.PI / 2;
      positions[id] = {
        x: gwX + radius * Math.cos(angle),
        y: gwY + radius * Math.sin(angle),
      };
    });
  }

  let svgHTML = '';

  svgHTML += `
    <defs>
      <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <marker id="arrow-cyan" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
        <path d="M0,0 L10,3 L0,6" fill="#06b6d4" opacity="0.7"/>
      </marker>
      <marker id="arrow-purple" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
        <path d="M0,0 L10,3 L0,6" fill="#a78bfa" opacity="0.7"/>
      </marker>
      <marker id="arrow-dim" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
        <path d="M0,0 L10,3 L0,6" fill="#2d3f56" opacity="0.5"/>
      </marker>
    </defs>`;

  // ── Helper: place a label box along an edge, offset perpendicularly ──
  function edgeLabelHTML(fromPos, toPos, stroke, line1, line2) {
    const dx = toPos.x - fromPos.x;
    const dy = toPos.y - fromPos.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    const ux = dx / len, uy = dy / len;

    // 65% along the edge toward destination
    const lx = fromPos.x + dx * 0.65;
    const ly = fromPos.y + dy * 0.65;

    // Perpendicular offset — push away from canvas center
    const perpScale = Math.min(42, Math.max(28, len * 0.12));
    const dot = (lx - gwX) * (-uy) + (ly - gwY) * ux;
    const sign = dot >= 0 ? 1 : -1;
    const ox = -uy * perpScale * sign;
    const oy =  ux * perpScale * sign;

    const bw = 110, bh = 40;
    let bx = lx + ox - bw / 2;
    let by = ly + oy - bh / 2;
    bx = Math.max(8, Math.min(W - bw - 8, bx));
    by = Math.max(8, Math.min(H - bh - 8, by));
    const mx = bx + bw / 2;

    return `
      <rect x="${bx}" y="${by}" width="${bw}" height="${bh}"
        rx="6" fill="#111827" stroke="${stroke}" stroke-width="1" opacity="0.92"/>
      <text x="${mx}" y="${by + 14}" text-anchor="middle"
        fill="${stroke}" font-family="JetBrains Mono" font-size="9" font-weight="600">${line1}</text>
      <text x="${mx}" y="${by + 28}" text-anchor="middle"
        fill="#5a6577" font-family="JetBrains Mono" font-size="8">${line2}</text>`;
  }

  // ── Draw edges from topology data ──
  const drawnEdges = new Set();

  edges.forEach(e => {
    const fromPos = positions[e.from];
    const toPos   = positions[e.to];
    if (!fromPos || !toPos) return;

    const edgeKey = [e.from, e.to].sort().join('-');
    if (drawnEdges.has(edgeKey)) return;
    drawnEdges.add(edgeKey);

    const isRoute = e.cost !== undefined && e.cost !== null;

    let stroke = '#1e2a3a';
    let marker = 'url(#arrow-dim)';
    let width = 1;
    let dash = '6,4';
    let opacity = 0.4;

    if (isRoute) {
      const nodeProto = nodes[e.from]?.protocol || '';
      const bestProto = e.protocol || (nodeProto.includes('BLE') ? 'BLE' : 'WiFi');
      stroke  = bestProto.includes('BLE') ? '#a78bfa' : '#06b6d4';
      marker  = bestProto.includes('BLE') ? 'url(#arrow-purple)' : 'url(#arrow-cyan)';
      width   = 2;
      dash    = '';
      opacity = 0.7;
    }

    const dx = toPos.x - fromPos.x;
    const dy = toPos.y - fromPos.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    const ux = dx / len, uy = dy / len;
    const fromR = (e.from === 'GATEWAY') ? 30 : 32;
    const toR   = (e.to   === 'GATEWAY') ? 30 : 32;
    const x1 = fromPos.x + ux * fromR;
    const y1 = fromPos.y + uy * fromR;
    const x2 = toPos.x   - ux * toR;
    const y2 = toPos.y   - uy * toR;

    svgHTML += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
      stroke="${stroke}" stroke-width="${width}"
      stroke-dasharray="${dash}" opacity="${opacity}"
      marker-end="${marker}"/>`;

    if (isRoute) {
      const latency  = e.latency   || 0;
      const cost     = e.cost      || 0;
      const hopCount = e.hop_count || 0;
      svgHTML += edgeLabelHTML(
        fromPos, toPos, stroke,
        `${latency > 0 ? latency.toFixed(1) + 'ms' : '—'} · ${hopCount}hop`,
        `cost: ${cost > 0 ? cost.toFixed(4) : '—'}`
      );
    }
  });

  // ── Fallback: draw gateway→node lines for nodes not in edges ──
  ids.forEach(id => {
    const edgeKey = ['GATEWAY', id].sort().join('-');
    if (drawnEdges.has(edgeKey)) return;
    drawnEdges.add(edgeKey);

    const p = positions[id];
    const n = nodes[id];
    const proto  = n.protocol || '';
    const stroke = proto.includes('BLE') ? '#a78bfa' : '#06b6d4';
    const arrowM = proto.includes('BLE') ? 'url(#arrow-purple)' : 'url(#arrow-cyan)';

    const dx = p.x - gwX, dy = p.y - gwY;
    const len = Math.sqrt(dx * dx + dy * dy);
    const ux = dx / len, uy = dy / len;
    const x1 = gwX + ux * 30,  y1 = gwY + uy * 30;
    const x2 = p.x - ux * 32,  y2 = p.y - uy * 32;

    svgHTML += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
      stroke="${stroke}" stroke-width="2" opacity="0.5" marker-end="${arrowM}"/>`;

    const lat  = n.avg_latency_ms || 0;
    const rssi = n.rssi || -99;
    svgHTML += edgeLabelHTML(
      { x: gwX, y: gwY }, p, stroke,
      `${proto.includes('BLE') ? 'Bluetooth' : 'WiFi'} · ${rssi}dBm`,
      `${lat > 0 ? lat.toFixed(1) + 'ms' : 'direct'}`
    );
  });

  // ── Gateway node ──
  svgHTML += `
    <circle cx="${gwX}" cy="${gwY}" r="28" fill="#111827" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)"/>
    <text x="${gwX}" y="${gwY - 2}" text-anchor="middle" dominant-baseline="middle"
      fill="#22c55e" font-family="JetBrains Mono" font-size="12" font-weight="700">GW</text>
    <text x="${gwX}" y="${gwY + 12}" text-anchor="middle"
      fill="rgba(34,197,94,0.6)" font-family="JetBrains Mono" font-size="8">GATEWAY</text>`;

  // ── Mesh nodes ──
  ids.forEach(id => {
    const p    = positions[id];
    const n    = nodes[id];
    const status = n.status || 'OFFLINE';
    const col  = status === 'ONLINE' ? '#06b6d4' : status === 'DEGRADED' ? '#f59e0b' : '#ef4444';
    const proto = n.protocol || '?';
    const score = n.health_score ?? 0;
    const lat   = n.avg_latency_ms || 0;
    const rssi  = n.rssi || -99;
    const mode  = n.route_mode || 'balanced';
    const scoreColor = score >= 70 ? '#22c55e' : score >= 40 ? '#f59e0b' : '#ef4444';

    svgHTML += `
      <circle cx="${p.x}" cy="${p.y}" r="30" fill="#111827" stroke="${col}" stroke-width="2" filter="url(#glow)"/>
      <text x="${p.x}" y="${p.y - 4}" text-anchor="middle"
        fill="${col}" font-family="JetBrains Mono" font-size="10" font-weight="700">${id}</text>
      <text x="${p.x}" y="${p.y + 9}" text-anchor="middle"
        fill="rgba(255,255,255,0.35)" font-family="JetBrains Mono" font-size="7">${proto}</text>
      <text x="${p.x}" y="${p.y + 48}" text-anchor="middle"
        fill="#8892a4" font-family="JetBrains Mono" font-size="10">
        ${lat > 0 ? lat.toFixed(1) + 'ms' : '—'} · ${rssi}dBm</text>
      <text x="${p.x}" y="${p.y + 62}" text-anchor="middle"
        fill="#5a6577" font-family="JetBrains Mono" font-size="9">
        Score: ${score} · ${mode}</text>`;
  });

  svg.innerHTML = svgHTML;
}

// ══════════════════════════════════════════════
//  TAB SWITCHING
// ══════════════════════════════════════════════
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');

    // Resize charts when switching to chart tabs
    if (tab.dataset.tab === 'charts' || tab.dataset.tab === 'compare') {
      Object.values(charts).forEach(c => c.resize());
    }
  });
});

connectWS();
